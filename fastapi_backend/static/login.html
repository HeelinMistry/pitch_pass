<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Login | PitchPass</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@simplewebauthn/browser/dist/bundle/index.umd.min.js"></script>

    <link rel="stylesheet" href="/static/css/style.css">

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        "pitch-green": "#cafd00",
                        "pitch-outline": "#767575"
                    }
                }
            }
        }
    </script>
</head>
<body class="flex items-center justify-center min-h-screen p-4">

    <div class="glass-card w-full max-w-[400px] p-8 md:p-10 shadow-2xl">
        <header class="text-center mb-10">
            <h1 class="font-headline text-5xl font-black uppercase tracking-tighter italic">
                Pitch<span class="text-pitch-green">Pass</span>
            </h1>
        </header>

        <div class="space-y-6">
            <div>
                <label class="block text-[10px] font-bold text-pitch-outline uppercase tracking-widest mb-2 ml-1">Squad Username</label>
                <input type="text"
                    id="username"
                    name="username"
                    autocomplete="username webauthn" placeholder="e.g. striker99"
                    class="kinetic-input w-full px-5 py-4 rounded-xl font-bold placeholder:text-pitch-outline/50">
            </div>

            <button id="loginBtn" class="w-full py-5 bg-pitch-green text-black font-black uppercase tracking-[0.15em] rounded-xl hover:bg-[#b5e500] active:scale-[0.98] transition-all flex items-center justify-center gap-2">
                <span class="material-symbols-outlined font-bold">Passkey</span>
                Sign In
            </button>

            <div id="statusMessage" class="text-center text-[11px] font-bold uppercase tracking-widest min-h-[1.5em] transition-colors">
                </div>
        </div>

        <footer class="mt-10 pt-6 border-t border-white/5 text-center">
            <p class="text-pitch-outline text-[10px] uppercase tracking-widest">
                New to the squad? <button id="registerBtn" class="text-pitch-green hover:underline">Register Passkey</button>
            </p>
        </footer>
    </div>
<script type="module">
    import { handleLogin, handleRegister } from '/static/js/auth.js';

    window.onload = () => {
        // Fade in the body
        document.body.style.opacity = "1";

        // Attach event listener
        const loginBtn = document.getElementById('loginBtn');
        if (loginBtn) loginBtn.onclick = handleLogin;

        const registerBtn = document.getElementById('registerBtn');
        if (registerBtn) registerBtn.onclick = handleRegister;
    };
</script>
</body>
</html>
