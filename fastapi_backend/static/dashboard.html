<!DOCTYPE html>
<html class="dark" lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>PitchPass | Pro Dashboard</title>

    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link rel="stylesheet" href="/static/css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>

    <script>
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "pitch-green": "#cafd00",
                        "pitch-outline": "#767575",
                        "surface-dark": "#0e0e0e",
                        "card-bg": "rgba(255, 255, 255, 0.03)"
                    },
                    fontFamily: { "headline": ["Space Grotesk"], "body": ["Manrope"] }
                }
            }
        }
    </script>
    <style>
        .pitch-grid-bg { background-image: radial-gradient(#767575 1px, transparent 1px); background-size: 32px 32px; opacity: 0.03; }
        .step-gradient { background: linear-gradient(135deg, #f3ffca 0%, #cafd00 100%); }
        /* Scrollbar styling for a pro look */
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #262626; border-radius: 10px; }
    </style>
</head>
<body class="bg-surface text-on-surface font-body selection:bg-pitch-green selection:text-black overflow-x-hidden">

<div class="flex min-h-screen relative">
    <div class="pitch-grid-bg fixed inset-0 pointer-events-none"></div>

    <aside class="flex flex-col h-screen w-64 border-r border-white/5 bg-[#0e0e0e] fixed left-0 top-0 z-40 p-6">
        <div class="mb-12">
            <h1 class="font-headline text-3xl font-black uppercase italic">
                Pitch<span class="text-[#cafd00]">Pass</span>
            </h1>
        </div>

        <nav class="flex-1">
            <a href="dashboard.html" class="flex items-center gap-3 px-4 py-3 bg-[#cafd00]/10 text-[#cafd00] rounded-xl font-bold">
                <span class="material-symbols-outlined">dashboard</span>
                <span>Dashboard</span>
            </a>
        </nav>

        <div class="mt-auto">
            <button onclick="openModal()" class="w-full py-4 rounded-xl font-headline font-black text-black bg-[#cafd00] uppercase tracking-widest hover:opacity-90 transition-all">
                Launch Match
            </button>
        </div>
    </aside>

    <main class="flex-1 md:ml-64 p-6 md:p-12 relative z-10">
        <header class="mb-16">
            <h2 class="text-6xl md:text-9xl font-black font-headline leading-none tracking-tighter uppercase italic opacity-90">
                Next <br/>Game <span class="text-pitch-green">Ready</span>
            </h2>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-12">
            <div id="match-container" class="lg:col-span-8 space-y-8">
                <div class="flex items-center justify-between border-b border-white/5 pb-4">
                    <h3 class="font-headline text-xl font-bold uppercase tracking-widest text-pitch-green">Active Pitch List</h3>
                </div>
                </div>

            <div class="lg:col-span-4">
                <div class="glass-card p-6 border-white/5">
                    <h3 class="font-headline text-xs font-black uppercase tracking-[0.2em] text-pitch-outline mb-6">Recent Activity</h3>
                    <div id="activity-feed" class="space-y-6">
                        </div>
                </div>
            </div>
        </div>
    </main>
</div>

<div id="createMatchModal" class="fixed inset-0 z-[100] hidden flex items-center justify-center bg-black/80 backdrop-blur-md p-4 opacity-0 transition-opacity duration-300">
    <div class="glass-card w-full max-w-xl border-white/10 shadow-2xl flex flex-col max-h-[90vh]">
        <div class="flex justify-between items-center p-8 border-b border-white/5">
            <h2 class="font-headline text-xl font-black uppercase italic tracking-tight text-pitch-green flex items-center gap-2">
                Draft New Match
            </h2>
            <button onclick="closeModal()" class="text-pitch-outline hover:text-white transition-colors">
                <span class="material-symbols-outlined">close</span>
            </button>
        </div>

        <div class="p-8 overflow-y-auto space-y-6 custom-scrollbar">
            <div class="space-y-1">
                <label class="text-[10px] uppercase font-bold tracking-widest text-pitch-outline ml-1">Atmosphere</label>
                <select id="sportType" class="kinetic-input w-full p-4 rounded-xl font-bold uppercase tracking-wider cursor-pointer appearance-none">
                    <option value="indoor_soccer">Indoor Soccer</option>
                    <option value="tennis">Tennis</option>
                    <option value="paddle">Paddle</option>
                </select>
            </div>

            <div class="space-y-1">
                <label class="text-[10px] uppercase font-bold tracking-widest text-pitch-outline ml-1">Match Identity</label>
                <input id="matchTitle" class="kinetic-input w-full p-4 rounded-xl font-headline" placeholder="e.g. Wednesday Elite 5-a-side" type="text"/>
            </div>

            <div class="grid grid-cols-2 gap-4">
                <div class="space-y-1">
                    <label class="text-[10px] uppercase font-bold tracking-widest text-pitch-outline ml-1">Kick-off Date</label>
                    <input id="matchDate" class="kinetic-input w-full p-4 rounded-xl text-sm" type="date"/>
                </div>
                <div class="space-y-1">
                    <label class="text-[10px] uppercase font-bold tracking-widest text-pitch-outline ml-1">Start Time</label>
                    <input id="matchTime" class="kinetic-input w-full p-4 rounded-xl text-sm" type="time"/>
                </div>
            </div>

            <div class="grid grid-cols-2 gap-6">
                <div class="space-y-1">
                    <label class="text-[10px] uppercase font-bold tracking-widest text-pitch-outline ml-1">Match Duration</label>
                    <div class="bg-white/5 p-4 rounded-xl flex items-center justify-between border border-white/5">
                        <button id="durMinus" class="text-pitch-green hover:scale-125 transition-transform"><span class="material-symbols-outlined text-sm">remove</span></button>
                        <span id="durationLabel" class="font-headline text-sm font-bold text-pitch-green">1.0 Hr</span>
                        <button id="durPlus" class="text-pitch-green hover:scale-125 transition-transform"><span class="material-symbols-outlined text-sm">add</span></button>
                    </div>
                </div>
                <div class="space-y-1">
                    <label class="text-[10px] uppercase font-bold tracking-widest text-pitch-outline ml-1">Pitch Location</label>
                    <input id="matchLocation" class="kinetic-input w-full p-4 rounded-xl text-sm h-[54px]" placeholder="The Pitch Venue" type="text"/>
                </div>
            </div>

            <div class="grid grid-cols-2 gap-6 pt-2">
                <div class="bg-white/5 p-4 rounded-xl flex items-center justify-between border border-white/5">
                    <span class="text-[10px] font-black uppercase tracking-widest text-pitch-outline">Squad Size</span>
                    <div class="flex items-center gap-4">
                        <button id="rosMinus" class="text-pitch-green hover:scale-125 transition-transform"><span class="material-symbols-outlined">remove</span></button>
                        <span id="rosterDisplay" class="font-headline text-xl font-bold">14</span>
                        <button id="rosPlus" class="text-pitch-green hover:scale-125 transition-transform"><span class="material-symbols-outlined">add</span></button>
                    </div>
                </div>
                <div class="bg-white/5 p-4 rounded-xl flex items-center justify-between border border-white/5">
                    <span class="text-[10px] font-black uppercase tracking-widest text-pitch-outline">Cost (R)</span>
                    <input id="matchCost" class="bg-transparent border-none focus:ring-0 text-right font-headline text-xl font-bold text-pitch-green w-20" placeholder="0" type="number"/>
                </div>
            </div>
        </div>

        <div class="p-8">
            <button id="generateBtn" class="w-full py-5 rounded-xl font-headline font-black text-black step-gradient uppercase tracking-[0.2em] active:scale-95 transition-all">
                Deploy Match
            </button>
        </div>
    </div>
</div>

<script type="module">
    import { initDashboard } from '/static/js/dashboard.js';
    window.onload = () => {
        // Force visibility first so you can see what is happening
        document.body.style.opacity = "1";
        initDashboard();
    };
</script>
</body>
</html>
