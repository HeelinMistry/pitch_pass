<!DOCTYPE html>
<html class="dark" lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Match Details | PitchPass</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link rel="stylesheet" href="/static/css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <script>
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "pitch-green": "#cafd00",
                        "pitch-outline": "#767575",
                        "surface-dark": "#0e0e0e"
                    },
                    fontFamily: { "headline": ["Space Grotesk"], "body": ["Manrope"] }
                }
            }
        }
    </script>
    <style>
        .pitch-grid-bg { background-image: radial-gradient(#767575 1px, transparent 1px); background-size: 32px 32px; opacity: 0.03; }
        .step-gradient { background: linear-gradient(135deg, #f3ffca 0%, #cafd00 100%); }
    </style>
</head>
<body class="bg-surface text-on-surface font-body selection:bg-pitch-green selection:text-black">

<div class="flex min-h-screen relative">
    <div class="pitch-grid-bg fixed inset-0 pointer-events-none"></div>

    <aside class="hidden md:flex flex-col h-screen w-64 border-r border-white/5 bg-surface fixed left-0 top-0 z-40 p-6">
        <div class="mb-12">
            <h1 class="font-headline text-3xl font-black uppercase italic tracking-tighter">
                Pitch<span class="text-pitch-green">Pass</span>
            </h1>
        </div>
        <nav class="flex-1 space-y-2">
            <a href="dashboard.html" class="flex items-center gap-3 px-4 py-3 text-pitch-outline hover:text-white rounded-xl transition-all group">
                <span class="material-symbols-outlined group-hover:text-pitch-green">dashboard</span>
                <span class="text-xs uppercase tracking-widest font-bold">Dashboard</span>
            </a>
        </nav>
    </aside>

    <main class="flex-1 md:ml-64 p-6 md:p-12 relative z-10">
        <div id="confirmModal" class="fixed inset-0 z-[100] hidden flex items-center justify-center bg-black/90 backdrop-blur-md p-4 opacity-0 transition-opacity duration-300">
            <div class="glass-card w-full max-w-sm p-8 text-center border-white/10 shadow-2xl">
                <span id="confirmIcon" class="material-symbols-outlined text-pitch-green text-4xl mb-4">warning</span>
                <h3 id="confirmTitle" class="font-headline text-xl font-bold uppercase italic text-white mb-2">Confirm Action</h3>
                <p id="confirmMessage" class="text-xs text-pitch-outline mb-8 leading-relaxed">Are you sure you want to proceed?</p>
                <div class="flex gap-4">
                    <button onclick="closeConfirmModal()" class="flex-1 py-4 rounded-xl font-black text-[10px] uppercase tracking-widest bg-white/5 hover:bg-white/10 transition-colors">Abort</button>
                    <button id="confirmActionBtn" class="flex-1 py-4 rounded-xl font-black text-[10px] uppercase tracking-widest bg-pitch-green text-black transition-transform active:scale-95">Confirm</button>
                </div>
            </div>
        </div>

        <button onclick="window.location.href='dashboard.html'" class="flex items-center gap-2 text-pitch-outline hover:text-pitch-green mb-12 transition-colors group">
            <span class="material-symbols-outlined transition-transform group-hover:-translate-x-1">arrow_back</span>
            <span class="font-bold uppercase tracking-[0.2em] text-[10px]">Return to Pitch List</span>
        </button>

        <div id="match-content" class="space-y-12">
            </div>
    </main>
</div>

<script type="module">
    import { initMatchDetails } from '/static/js/match_details.js';
    window.onload = () => {
        initMatchDetails();
    };
</script>
</body>
</html>
